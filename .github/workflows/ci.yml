name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [develop, master]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Type check
        run: bun run typecheck
      - name: Build
        run: bun run build
      - run: bun test
