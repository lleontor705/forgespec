<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" fill="none">
  <defs>
    <linearGradient id="bg-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accent-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
    <linearGradient id="accent-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="accent-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="accent-amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="480" rx="12" fill="#020617"/>

  <!-- Title -->
  <text x="350" y="35" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#e2e8f0" text-anchor="middle">
    ForgeSpec Plugin Architecture
  </text>

  <!-- AI Agents Row -->
  <text x="350" y="65" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle" letter-spacing="2">
    SDD AGENTS
  </text>

  <g transform="translate(30, 78)" filter="url(#card-shadow)">
    <rect width="90" height="36" rx="6" fill="url(#bg-card)" stroke="#334155" stroke-width="1"/>
    <text x="45" y="23" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#e2e8f0" text-anchor="middle">Bootstrap</text>
  </g>
  <g transform="translate(130, 78)" filter="url(#card-shadow)">
    <rect width="90" height="36" rx="6" fill="url(#bg-card)" stroke="#334155" stroke-width="1"/>
    <text x="45" y="23" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#e2e8f0" text-anchor="middle">Investigate</text>
  </g>
  <g transform="translate(230, 78)" filter="url(#card-shadow)">
    <rect width="90" height="36" rx="6" fill="url(#bg-card)" stroke="#334155" stroke-width="1"/>
    <text x="45" y="23" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#e2e8f0" text-anchor="middle">Architect</text>
  </g>
  <g transform="translate(330, 78)" filter="url(#card-shadow)">
    <rect width="90" height="36" rx="6" fill="url(#bg-card)" stroke="#334155" stroke-width="1"/>
    <text x="45" y="23" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#e2e8f0" text-anchor="middle">Decompose</text>
  </g>
  <g transform="translate(430, 78)" filter="url(#card-shadow)">
    <rect width="90" height="36" rx="6" fill="url(#bg-card)" stroke="#334155" stroke-width="1"/>
    <text x="45" y="23" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#e2e8f0" text-anchor="middle">Implement</text>
  </g>
  <g transform="translate(530, 78)" filter="url(#card-shadow)">
    <rect width="90" height="36" rx="6" fill="url(#bg-card)" stroke="#334155" stroke-width="1"/>
    <text x="45" y="23" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#e2e8f0" text-anchor="middle">Validate</text>
  </g>

  <!-- Connection lines -->
  <line x1="75" y1="114" x2="350" y2="150" stroke="#334155" stroke-width="1" stroke-dasharray="4"/>
  <line x1="175" y1="114" x2="350" y2="150" stroke="#334155" stroke-width="1" stroke-dasharray="4"/>
  <line x1="275" y1="114" x2="350" y2="150" stroke="#334155" stroke-width="1" stroke-dasharray="4"/>
  <line x1="375" y1="114" x2="350" y2="150" stroke="#334155" stroke-width="1" stroke-dasharray="4"/>
  <line x1="475" y1="114" x2="350" y2="150" stroke="#334155" stroke-width="1" stroke-dasharray="4"/>
  <line x1="575" y1="114" x2="350" y2="150" stroke="#334155" stroke-width="1" stroke-dasharray="4"/>

  <!-- Hooks label -->
  <rect x="295" y="128" width="110" height="20" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="350" y="142" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">OpenCode Plugin</text>

  <!-- ForgeSpec Plugin Box -->
  <g transform="translate(50, 155)" filter="url(#card-shadow)">
    <rect width="600" height="50" rx="8" fill="url(#accent-purple)" opacity="0.15" stroke="#6366f1" stroke-width="1.5"/>
    <rect x="2" y="2" width="596" height="46" rx="7" fill="url(#bg-card)"/>
    <text x="300" y="22" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#a78bfa" text-anchor="middle">ForgeSpec Plugin v1.1.0</text>
    <text x="300" y="39" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">@opencode-ai/plugin + Zod validation + bun:sqlite | 20 tools + 2 hooks</text>
  </g>

  <!-- Tool modules row -->
  <!-- SDD Contracts -->
  <g transform="translate(30, 225)" filter="url(#card-shadow)">
    <rect width="152" height="110" rx="8" fill="url(#bg-card)" stroke="#6366f1" stroke-width="1"/>
    <rect x="0" y="0" width="152" height="28" rx="8" fill="url(#accent-purple)" opacity="0.2"/>
    <rect x="0" y="14" width="152" height="14" fill="url(#accent-purple)" opacity="0.2"/>
    <text x="76" y="19" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#a78bfa" text-anchor="middle">SDD Contracts</text>
    <text x="12" y="46" font-family="monospace" font-size="8.5" fill="#94a3b8">sdd_validate</text>
    <text x="12" y="58" font-family="monospace" font-size="8.5" fill="#94a3b8">sdd_parse_contract</text>
    <text x="12" y="70" font-family="monospace" font-size="8.5" fill="#94a3b8">sdd_save / sdd_get</text>
    <text x="12" y="82" font-family="monospace" font-size="8.5" fill="#94a3b8">sdd_list / sdd_history</text>
    <text x="12" y="94" font-family="monospace" font-size="8.5" fill="#94a3b8">sdd_phases</text>
  </g>

  <!-- Task Board -->
  <g transform="translate(200, 225)" filter="url(#card-shadow)">
    <rect width="190" height="110" rx="8" fill="url(#bg-card)" stroke="#06b6d4" stroke-width="1"/>
    <rect x="0" y="0" width="190" height="28" rx="8" fill="url(#accent-cyan)" opacity="0.2"/>
    <rect x="0" y="14" width="190" height="14" fill="url(#accent-cyan)" opacity="0.2"/>
    <text x="95" y="19" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#22d3ee" text-anchor="middle">Task Board</text>
    <text x="12" y="46" font-family="monospace" font-size="8.5" fill="#94a3b8">tb_create_board / tb_status</text>
    <text x="12" y="58" font-family="monospace" font-size="8.5" fill="#94a3b8">tb_add_task / tb_claim</text>
    <text x="12" y="70" font-family="monospace" font-size="8.5" fill="#94a3b8">tb_update / tb_unblocked</text>
    <text x="12" y="82" font-family="monospace" font-size="8.5" fill="#94a3b8">tb_get / tb_delete_task</text>
    <text x="12" y="94" font-family="monospace" font-size="8.5" fill="#94a3b8">tb_add_notes / tb_list</text>
  </g>

  <!-- File Reservation -->
  <g transform="translate(408, 225)" filter="url(#card-shadow)">
    <rect width="130" height="110" rx="8" fill="url(#bg-card)" stroke="#f97316" stroke-width="1"/>
    <rect x="0" y="0" width="130" height="28" rx="8" fill="url(#accent-orange)" opacity="0.2"/>
    <rect x="0" y="14" width="130" height="14" fill="url(#accent-orange)" opacity="0.2"/>
    <text x="65" y="19" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#fb923c" text-anchor="middle">File Reservation</text>
    <text x="12" y="46" font-family="monospace" font-size="8.5" fill="#94a3b8">file_reserve</text>
    <text x="12" y="58" font-family="monospace" font-size="8.5" fill="#94a3b8">file_check</text>
    <text x="12" y="70" font-family="monospace" font-size="8.5" fill="#94a3b8">file_release</text>
    <text x="12" y="88" font-family="monospace" font-size="8" fill="#64748b">TTL + glob overlap</text>
  </g>

  <!-- Hooks -->
  <g transform="translate(556, 225)" filter="url(#card-shadow)">
    <rect width="114" height="110" rx="8" fill="url(#bg-card)" stroke="#f59e0b" stroke-width="1"/>
    <rect x="0" y="0" width="114" height="28" rx="8" fill="url(#accent-amber)" opacity="0.2"/>
    <rect x="0" y="14" width="114" height="14" fill="url(#accent-amber)" opacity="0.2"/>
    <text x="57" y="19" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#fbbf24" text-anchor="middle">Hooks</text>
    <text x="12" y="48" font-family="system-ui, sans-serif" font-size="8" fill="#94a3b8">System Prompt</text>
    <text x="12" y="60" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">Contract injection</text>
    <text x="12" y="80" font-family="system-ui, sans-serif" font-size="8" fill="#94a3b8">Quality Gates</text>
    <text x="12" y="92" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">Output validation</text>
  </g>

  <!-- Connection to databases -->
  <line x1="250" y1="335" x2="250" y2="365" stroke="#334155" stroke-width="1.5"/>
  <line x1="450" y1="335" x2="450" y2="365" stroke="#334155" stroke-width="1.5"/>

  <!-- Main Database -->
  <g transform="translate(50, 365)" filter="url(#card-shadow)">
    <rect width="290" height="55" rx="8" fill="url(#bg-card)" stroke="#22c55e" stroke-width="1"/>
    <rect x="0" y="0" width="290" height="24" rx="8" fill="url(#accent-green)" opacity="0.15"/>
    <rect x="0" y="12" width="290" height="12" fill="url(#accent-green)" opacity="0.15"/>
    <text x="145" y="17" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#4ade80" text-anchor="middle">SQLite Database (WAL)</text>
    <text x="145" y="38" font-family="monospace" font-size="8" fill="#94a3b8" text-anchor="middle">boards | tasks | contracts | file_reservations</text>
    <text x="145" y="49" font-family="monospace" font-size="8" fill="#94a3b8" text-anchor="middle">audit_log | notifications</text>
  </g>

  <!-- Messaging Database -->
  <g transform="translate(360, 365)" filter="url(#card-shadow)">
    <rect width="290" height="55" rx="8" fill="url(#bg-card)" stroke="#22c55e" stroke-width="1"/>
    <rect x="0" y="0" width="290" height="24" rx="8" fill="url(#accent-green)" opacity="0.15"/>
    <rect x="0" y="12" width="290" height="12" fill="url(#accent-green)" opacity="0.15"/>
    <text x="145" y="17" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#4ade80" text-anchor="middle">Inter-Agent Messaging</text>
    <text x="145" y="38" font-family="monospace" font-size="8" fill="#94a3b8" text-anchor="middle">threads | messages | messages_fts (FTS5)</text>
    <text x="145" y="49" font-family="monospace" font-size="8" fill="#64748b" text-anchor="middle">Full-text search + notifications</text>
  </g>

  <!-- Footer -->
  <text x="350" y="460" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">
    Bun >= 1.3.5 | bun:sqlite | Zod runtime validation | Strict TypeScript
  </text>
</svg>
